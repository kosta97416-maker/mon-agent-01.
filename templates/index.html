<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEO – Command Center</title>
  <style>
    body { background:#111; color:#eee; font-family:sans-serif; padding:20px; display:flex; flex-direction:column; align-items:center; }
    textarea { width:100%; max-width:700px; height:80px; background:#222; color:white; border:1px solid #444; padding:10px; margin-bottom:10px; }
    button { padding:10px 20px; margin:5px; background:#0d6efd; color:white; border:none; cursor:pointer; border-radius:5px; }
    #reply-box { width:100%; max-width:700px; background:#1a1a1a; padding:15px; margin-top:20px; border-radius:8px; white-space:pre-wrap; }
    .row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    iframe { width:100%; max-width:700px; height:500px; border:2px solid #333; margin-top:10px; background:white; display:none; }
    #voice-btn { background:#f0ad4e; } /* bouton orangé pour la voix */
  </style>
</head>
<body>
<h1>🚀 NEO – Command Center</h1>
<textarea id="prompt" placeholder="Parle à Neo... (ex : crée un site vitrine pour un plombier, scan les airdrops)"></textarea>
<button onclick="sendChat()">Envoyer</button>

<div id="reply-box">Appuyez sur Envoyer pour parler à Neo.</div>
<button id="voice-btn" onclick="speakReply()" style="display:none;">🔊 Lire la réponse</button>
<iframe id="preview-frame"></iframe>

<div class="row">
  <button onclick="resetMemory()">🧹 Reset Mémoire</button>
  <button onclick="scanOpps()">🔍 Scan Opportunités</button>
</div>

<script>
const PASSWORD = prompt("Mot de passe Neo ?");

function headers() {
  return {
    'Content-Type': 'application/json',
    'X-Neo-Password': PASSWORD
  };
}

async function sendChat() {
  const prompt = document.getElementById('prompt').value;
  if (!prompt) return;
  document.getElementById('reply-box').innerText = "Neo réfléchit...";
  document.getElementById('voice-btn').style.display = 'none';

  const res = await fetch('/chat', {
    method: 'POST',
    headers: headers(),
    body: JSON.stringify({ message: prompt })
  });

  const data = await res.json();
  const reply = data.reply || "Erreur inconnue";

  // Affichage du texte
  document.getElementById('reply-box').innerText = reply;
  document.getElementById('voice-btn').style.display = 'inline-block';

  // Aperçu du site si code HTML présent
  const match = reply.match(/```html\s*([\s\S]*?)```/);
  const iframe = document.getElementById('preview-frame');
  if (match) {
    iframe.srcdoc = match[1];
    iframe.style.display = 'block';
  } else {
    iframe.style.display = 'none';
  }
}

// Synthèse vocale
function speakReply() {
  const text = document.getElementById('reply-box').innerText;
  if (!text || text === "Neo réfléchit...") return;
  
  // Supprimer les blocs de code pour ne pas les lire
  const cleanText = text.replace(/```[\s\S]*?```/g, '(code non lu)');
  
  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.lang = 'fr-FR';
  utterance.rate = 1.1; // un peu plus rapide
  window.speechSynthesis.cancel(); // stoppe toute lecture en cours
  window.speechSynthesis.speak(utterance);
}

async function resetMemory() {
  await fetch('/reset', { method: 'POST', headers: headers() });
  document.getElementById('reply-box').innerText = "Mémoire effacée.";
  document.getElementById('voice-btn').style.display = 'none';
}

async function scanOpps() {
  const res = await fetch('/scan', {
    method: 'POST',
    headers: headers()
  });
  const data = await res.json();
  const text = JSON.stringify(data, null, 2);
  document.getElementById('reply-box').innerText = text;
  document.getElementById('voice-btn').style.display = 'inline-block';
}
</script>
</body>
</html>
