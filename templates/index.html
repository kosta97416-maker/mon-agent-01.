<div class="p-8">
    <div class="max-w-4xl mx-auto">
        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-cyan-600 rounded-2xl blur opacity-20 group-focus-within:opacity-40 transition duration-1000"></div>
            <div class="relative flex items-center glass rounded-2xl p-2">
                
                <button id="mic-btn" onclick="toggleMic()" class="p-3 hover:bg-white/5 rounded-xl transition-all group">
                    <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-500 group-hover:text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                    </svg>
                </button>

                <input id="user-input" type="text" 
                       class="flex-1 bg-transparent border-none py-4 px-4 text-white focus:outline-none placeholder:text-slate-600 text-sm" 
                       placeholder="Parlez ou tapez une commande...">
                
                <button id="send-btn" onclick="envoyerOrdre()" 
                        class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-900/20">
                    EXÉCUTER
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- LOGIQUE VOCALE ---
    const recognition = window.SpeechRecognition || window.webkitSpeechRecognition ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
    let isListening = false;

    if (recognition) {
        recognition.lang = 'fr-FR';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById('user-input').value = transcript;
            stopMicStyle();
            envoyerOrdre(); // Envoie automatiquement après avoir parlé
        };

        recognition.onerror = () => stopMicStyle();
        recognition.onend = () => stopMicStyle();
    }

    function toggleMic() {
        if (!recognition) {
            alert("La reconnaissance vocale n'est pas supportée par votre navigateur.");
            return;
        }
        if (!isListening) {
            recognition.start();
            startMicStyle();
        } else {
            recognition.stop();
            stopMicStyle();
        }
    }

    function startMicStyle() {
        isListening = true;
        document.getElementById('mic-icon').classList.add('text-red-500', 'animate-pulse');
        document.getElementById('user-input').placeholder = "NÉO vous écoute...";
    }

    function stopMicStyle() {
        isListening = false;
        document.getElementById('mic-icon').classList.remove('text-red-500', 'animate-pulse');
        document.getElementById('mic-icon').classList.add('text-slate-500');
        document.getElementById('user-input').placeholder = "Entrez une commande pour NÉO...";
    }
    // --- FIN LOGIQUE VOCALE ---
</script>
